<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esquenta AUVP Private Day</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anek+Latin:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'DiscoDiva';
            src: url('https://raw.githubusercontent.com/eriadesign/privateday/main/discodiva-base.otf') format('opentype');
            font-weight: normal; font-style: normal; font-display: swap;
        }
        .font-poppins { font-family: 'Poppins', sans-serif; }
        .font-discodiva { font-family: 'DiscoDiva', cursive, serif; letter-spacing: 0.02em; }

        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #DB7944; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a6460f; }

        .film-grain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999; opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .vintage-btn {
            background: linear-gradient(135deg, #0B2A47 0%, #932621 100%);
            color: #FFF7EB;
            box-shadow: 0 4px 15px rgba(147,38,33,0.35);
            transition: all 0.3s ease;
        }
        .vintage-btn:hover { box-shadow: 0 6px 22px rgba(147,38,33,0.55); transform: translateY(-2px); }

        /* ── PISTA 80s: LADRILHOS ── */
        .dance-tiles {
            position: absolute; inset: 0;
            display: grid;
            grid-template-columns: repeat(14, 1fr);
            grid-template-rows: repeat(9, 1fr);
            pointer-events: none;
        }
        .tile {
            border: 1px solid rgba(255,255,255,0.04);
        }
        @keyframes t-pink   { 0%,100%{background:transparent;box-shadow:none} 50%{background:rgba(255,0,200,.35);box-shadow:inset 0 0 18px rgba(255,0,200,.7),0 0 12px rgba(255,0,200,.4)} }
        @keyframes t-cyan   { 0%,100%{background:transparent;box-shadow:none} 50%{background:rgba(0,255,255,.35);box-shadow:inset 0 0 18px rgba(0,255,255,.7),0 0 12px rgba(0,255,255,.4)} }
        @keyframes t-yellow { 0%,100%{background:transparent;box-shadow:none} 50%{background:rgba(255,220,0,.35);box-shadow:inset 0 0 18px rgba(255,220,0,.7),0 0 12px rgba(255,220,0,.4)} }
        @keyframes t-orange { 0%,100%{background:transparent;box-shadow:none} 50%{background:rgba(255,100,0,.35);box-shadow:inset 0 0 18px rgba(255,100,0,.7),0 0 12px rgba(255,100,0,.4)} }
        @keyframes t-purple { 0%,100%{background:transparent;box-shadow:none} 50%{background:rgba(160,0,255,.35);box-shadow:inset 0 0 18px rgba(160,0,255,.7),0 0 12px rgba(160,0,255,.4)} }
        @keyframes t-green  { 0%,100%{background:transparent;box-shadow:none} 50%{background:rgba(0,255,100,.35);box-shadow:inset 0 0 18px rgba(0,255,100,.7),0 0 12px rgba(0,255,100,.4)} }
        .t-pink   { animation: t-pink   var(--dur,2s) ease-in-out var(--del,0s) infinite; }
        .t-cyan   { animation: t-cyan   var(--dur,2s) ease-in-out var(--del,0s) infinite; }
        .t-yellow { animation: t-yellow var(--dur,2s) ease-in-out var(--del,0s) infinite; }
        .t-orange { animation: t-orange var(--dur,2s) ease-in-out var(--del,0s) infinite; }
        .t-purple { animation: t-purple var(--dur,2s) ease-in-out var(--del,0s) infinite; }
        .t-green  { animation: t-green  var(--dur,2s) ease-in-out var(--del,0s) infinite; }

        /* ── VINIL GIRATÓRIO ── */
        @keyframes spin-vinyl { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        .spin-vinyl { transform-origin: center; animation: spin-vinyl 2s linear infinite; }

        /* ── EQUALIZER ── */
        @keyframes eq1 { 0%,100%{height:3px} 50%{height:10px} }
        @keyframes eq2 { 0%,100%{height:6px} 50%{height:3px}  }
        @keyframes eq3 { 0%,100%{height:8px} 50%{height:4px}  }
        @keyframes eq4 { 0%,100%{height:2px} 50%{height:12px} }
        @keyframes eq5 { 0%,100%{height:10px} 50%{height:2px} }

        /* ── DJ AVATAR ── */
        @keyframes dj-bounce { 0%,100%{transform:translateY(0) scale(1.12)} 50%{transform:translateY(-7px) scale(1.18)} }
        .dj-bounce { animation: dj-bounce .75s ease-in-out infinite; }

        /* ── AVATAR MODAL ── */
        @keyframes fadeInUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .fade-in-up { animation: fadeInUp .3s ease-out forwards; }

        .modal-wrap {
            background: #0d0d0d;
            border: 1px solid rgba(219,121,68,.25);
            color: #FFF7EB;
        }

        .av-btn {
            padding: 5px 10px; font-size: 11px; border-radius: 8px;
            border: 1px solid; white-space: nowrap; transition: all .18s ease;
            font-weight: 500; cursor: pointer;
        }
        .av-btn-on  { background:#DB7944; color:#fff; border-color:#DB7944; box-shadow:0 0 8px rgba(219,121,68,.5); }
        .av-btn-off { background:rgba(255,247,235,.04); border-color:rgba(255,247,235,.14); color:rgba(255,247,235,.65); }
        .av-btn-off:hover { background:rgba(255,247,235,.1); border-color:rgba(255,247,235,.35); color:#fff; }

        /* ── GLOW DA CABINE ── */
        @keyframes booth-glow {
            0%,100% { box-shadow: 0 0 16px rgba(255,0,200,.5), 0 0 32px rgba(255,0,200,.2); }
            33%      { box-shadow: 0 0 16px rgba(0,255,255,.5), 0 0 32px rgba(0,255,255,.2); }
            66%      { box-shadow: 0 0 16px rgba(255,220,0,.5),  0 0 32px rgba(255,220,0,.2);  }
        }
        .booth-glow { animation: booth-glow 3s ease-in-out infinite; }

        @keyframes my-turn-pulse {
            0%,100% { opacity:1; transform:scale(1); }
            50%      { opacity:.8; transform:scale(1.04); }
        }
        .my-turn-badge { animation: my-turn-pulse .9s ease-in-out infinite; }
    </style>
</head>
<body class="bg-[#050505] text-[#FFF7EB] font-poppins overflow-hidden h-screen flex flex-col relative">

    <div class="film-grain"></div>

    <!-- CARREGAMENTO -->
    <div id="loadingScreen" class="fixed inset-0 bg-[#050505] z-[100] flex flex-col items-center justify-center">
        <img src="https://raw.githubusercontent.com/eriadesign/privateday/main/globo.webp" alt="Globo" class="w-24 h-24 mb-6 animate-pulse">
        <h1 class="font-discodiva text-4xl tracking-widest text-[#DB7944]">Carregando a pista...</h1>
    </div>

    <!-- HEADER -->
    <header class="bg-[#0a0a0a] border-b border-[#FFF7EB]/8 p-3 flex justify-between items-center z-10 relative shadow-lg">
        <div class="flex items-center gap-3">
            <img src="https://raw.githubusercontent.com/eriadesign/privateday/main/globo.webp" alt="AUVP" class="h-10 md:h-13 w-auto object-contain drop-shadow-lg">
            <div>
                <h1 class="font-discodiva text-2xl md:text-3xl text-[#FFF7EB] tracking-wide leading-none">PRIVATE DAY</h1>
                <p class="text-[10px] md:text-xs text-[#DB7944] uppercase tracking-[.2em] font-semibold mt-1">Esquenta 2026</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <div class="flex items-center gap-2 text-xs text-[#FFF7EB]/70 bg-black/50 px-3 py-1.5 rounded-full border border-[#FFF7EB]/8">
                <span id="icon-users" class="text-[#DB7944]"></span>
                <span id="onlineCount">0 online</span>
            </div>
            <button id="openSettingsBtn" class="flex items-center gap-2 bg-black/50 hover:bg-[#FFF7EB]/8 border border-[#FFF7EB]/10 p-1.5 rounded-lg transition">
                <img id="headerAvatar" src="" alt="" class="w-8 h-8 rounded-full bg-[#111] hidden"/>
                <span id="headerName" class="font-medium hidden sm:block text-[#FFF7EB] text-sm">Investidor</span>
                <span id="headerCrown" class="text-[#DB7944] hidden"></span>
            </button>
        </div>
    </header>

    <!-- MAIN -->
    <main class="flex-1 flex flex-col lg:flex-row overflow-hidden relative">

        <!-- ESQUERDA -->
        <section class="flex-1 flex flex-col relative border-r border-[#FFF7EB]/8">

            <!-- PLAYER -->
            <div id="playerContainer" class="bg-[#030303] aspect-video lg:h-72 w-full shrink-0 border-b border-[#FFF7EB]/8 relative z-20 shadow-2xl flex items-center justify-center group overflow-hidden"></div>

            <!-- PISTA DE DANÇA -->
            <div id="danceFloor" class="flex-1 relative overflow-hidden cursor-crosshair" style="background:#050505;">

                <!-- Ladrilhos 80s -->
                <div class="dance-tiles" id="danceTiles"></div>

                <!-- Luzes de palco ambiente -->
                <div class="absolute top-0 left-1/4 w-72 h-72 rounded-full blur-3xl animate-pulse mix-blend-screen pointer-events-none" style="background:rgba(255,0,200,.06)"></div>
                <div class="absolute top-0 right-1/4 w-72 h-72 rounded-full blur-3xl animate-pulse mix-blend-screen pointer-events-none" style="background:rgba(0,255,255,.06);animation-delay:.8s"></div>
                <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-96 h-48 rounded-full blur-3xl animate-pulse mix-blend-screen pointer-events-none" style="background:rgba(219,121,68,.07);animation-delay:1.6s"></div>

                <!-- Watermark -->
                <div class="absolute inset-0 flex items-center justify-center pointer-events-none" style="opacity:.025">
                    <h1 class="font-discodiva text-[9rem] md:text-[14rem] text-[#FFF7EB]">AUVP</h1>
                </div>

                <div class="absolute top-3 left-3 text-[10px] text-[#FFF7EB]/40 pointer-events-none bg-black/60 px-3 py-1 rounded-full border border-[#FFF7EB]/8 backdrop-blur-sm z-10">
                    Clique na pista para se mover
                </div>

                <!-- Cabine de DJ (canto inferior direito) -->
                <div id="djBooth" class="absolute z-10" style="right:10px;bottom:10px;pointer-events:none;"></div>

                <!-- Avatares -->
                <div id="usersLayer" class="absolute inset-0 w-full h-full pointer-events-none"></div>
            </div>
        </section>

        <!-- DIREITA: Chat & Fila -->
        <aside class="w-full lg:w-96 flex flex-col bg-[#0a0a0a] h-[50vh] lg:h-auto shrink-0 z-30 border-t lg:border-t-0 border-[#FFF7EB]/8" style="box-shadow:-8px 0 24px rgba(0,0,0,.6)">

            <div class="flex border-b border-[#FFF7EB]/8 bg-black/30">
                <div class="flex-1 text-center py-3 text-sm font-semibold text-[#DB7944] border-b-2 border-[#DB7944] flex items-center justify-center gap-2">
                    <span id="icon-message"></span> Chat ao Vivo
                </div>
            </div>

            <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-4"></div>

            <div class="p-3 bg-black/30 border-t border-[#FFF7EB]/8">
                <form id="chatForm" class="flex gap-2">
                    <input type="text" id="chatInput" placeholder="Mande uma mensagem pra galera..." maxlength="200"
                        class="flex-1 bg-black/50 border border-[#FFF7EB]/10 rounded-full px-4 py-2 text-sm focus:outline-none focus:border-[#DB7944] transition text-[#FFF7EB] font-light"/>
                    <button type="submit" id="chatSubmit" disabled
                        class="bg-[#DB7944] text-white p-2 rounded-full hover:bg-[#c45d1b] transition disabled:opacity-40 disabled:cursor-not-allowed shadow-lg">
                        <span id="icon-send"></span>
                    </button>
                </form>
            </div>

            <!-- FILA DO DJ -->
            <div class="border-t-[5px] border-[#0B2A47] bg-black/20 flex flex-col h-1/3 min-h-[240px]">
                <div class="p-3 bg-black/40 border-b border-[#FFF7EB]/8 flex justify-between items-center">
                    <h3 class="text-sm font-semibold flex items-center gap-2 text-[#FFF7EB]">
                        <span id="icon-music-small" class="text-[#DB7944]"></span> Fila do DJ
                    </h3>
                    <span id="queueCount" class="text-xs bg-black/60 border border-[#FFF7EB]/10 px-2 py-1 rounded text-[#FFF7EB]/60">0 vídeos</span>
                </div>
                <div id="queueList" class="flex-1 overflow-y-auto p-2 space-y-2"></div>
                <div class="p-3 bg-black/40 border-t border-[#FFF7EB]/8">
                    <form id="queueForm" class="flex gap-2">
                        <input type="text" id="videoUrlInput" placeholder="Cole o link do YouTube..."
                            class="flex-1 bg-black/60 border border-[#FFF7EB]/10 rounded px-3 py-2 text-xs focus:outline-none focus:border-[#DB7944] transition text-[#FFF7EB] font-light"/>
                        <button type="submit" class="bg-[#0B2A47] text-white p-2 rounded hover:bg-[#071d33] transition shadow-lg" title="Adicionar à fila">
                            <span id="icon-plus"></span>
                        </button>
                    </form>
                </div>
            </div>
        </aside>
    </main>

    <!-- MODAL DE AVATAR (DARK) -->
    <div id="settingsModal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex items-center justify-center p-4">
        <div class="modal-wrap rounded-2xl w-full max-w-lg shadow-2xl max-h-[92vh] overflow-y-auto relative p-6">

            <h2 class="font-discodiva text-3xl md:text-4xl mb-5 flex items-center gap-3 text-[#DB7944]">
                <span id="icon-settings"></span> Crie seu Avatar
            </h2>

            <div class="space-y-4">
                <!-- Nome -->
                <div>
                    <label class="block text-xs font-medium text-[#FFF7EB]/50 mb-1 uppercase tracking-widest">Seu Nome / Apelido</label>
                    <input type="text" id="profileName"
                        class="w-full bg-black/60 border border-[#FFF7EB]/15 rounded-lg px-4 py-2.5 focus:outline-none focus:border-[#DB7944] focus:ring-1 focus:ring-[#DB7944] transition text-[#FFF7EB] font-light text-sm"
                        placeholder="Como quer ser chamado?"/>
                </div>

                <!-- Preview + Customização -->
                <div class="bg-black/40 rounded-xl border border-[#FFF7EB]/10 p-4">
                    <!-- Preview -->
                    <div class="flex items-center justify-center mb-5">
                        <div id="avatarPreviewContainer" class="w-28 h-28 rounded-full bg-[#111] overflow-hidden shadow-xl transition-all relative">
                            <img id="avatarPreviewImage" src="" alt="Preview" class="w-full h-full object-cover"/>
                        </div>
                    </div>

                    <div class="space-y-4" id="avatarSections">
                        <!-- Cabelo -->
                        <div>
                            <label class="block text-[10px] font-bold text-[#DB7944] mb-2 uppercase tracking-widest">Cabelo / Chapéu</label>
                            <div id="avatarTops" class="flex gap-1.5 overflow-x-auto pb-1"></div>
                        </div>
                        <!-- Acessórios -->
                        <div>
                            <label class="block text-[10px] font-bold text-[#DB7944] mb-2 uppercase tracking-widest">Acessórios</label>
                            <div id="avatarAccessories" class="flex gap-1.5 overflow-x-auto pb-1"></div>
                        </div>
                        <!-- Barba -->
                        <div>
                            <label class="block text-[10px] font-bold text-[#DB7944] mb-2 uppercase tracking-widest">Barba / Bigode</label>
                            <div id="avatarFacialHair" class="flex gap-1.5 overflow-x-auto pb-1"></div>
                        </div>
                        <!-- Roupas -->
                        <div>
                            <label class="block text-[10px] font-bold text-[#DB7944] mb-2 uppercase tracking-widest">Roupas</label>
                            <div id="avatarClothes" class="flex gap-1.5 overflow-x-auto pb-1"></div>
                        </div>
                        <!-- Olhos -->
                        <div>
                            <label class="block text-[10px] font-bold text-[#DB7944] mb-2 uppercase tracking-widest">Olhos</label>
                            <div id="avatarEyes" class="flex gap-1.5 overflow-x-auto pb-1"></div>
                        </div>
                        <!-- Sobrancelhas -->
                        <div>
                            <label class="block text-[10px] font-bold text-[#DB7944] mb-2 uppercase tracking-widest">Sobrancelhas</label>
                            <div id="avatarEyebrows" class="flex gap-1.5 overflow-x-auto pb-1"></div>
                        </div>
                        <!-- Boca -->
                        <div>
                            <label class="block text-[10px] font-bold text-[#DB7944] mb-2 uppercase tracking-widest">Boca</label>
                            <div id="avatarMouths" class="flex gap-1.5 overflow-x-auto pb-1"></div>
                        </div>
                        <!-- Tom de pele -->
                        <div>
                            <label class="block text-[10px] font-bold text-[#DB7944] mb-2 uppercase tracking-widest">Tom de Pele</label>
                            <div id="avatarSkin" class="flex gap-2 flex-wrap"></div>
                        </div>
                        <!-- Cor do cabelo -->
                        <div>
                            <label class="block text-[10px] font-bold text-[#DB7944] mb-2 uppercase tracking-widest">Cor do Cabelo</label>
                            <div id="avatarHairColor" class="flex gap-2 flex-wrap"></div>
                        </div>
                        <!-- Cor da roupa -->
                        <div>
                            <label class="block text-[10px] font-bold text-[#DB7944] mb-2 uppercase tracking-widest">Cor da Roupa</label>
                            <div id="avatarClothingColor" class="flex gap-2 flex-wrap"></div>
                        </div>
                    </div>
                </div>

                <!-- Cor da Aura -->
                <div>
                    <label class="block text-xs font-medium text-[#FFF7EB]/50 mb-2 uppercase tracking-widest">Cor da Aura na Pista</label>
                    <div id="avatarColors" class="flex gap-2 flex-wrap"></div>
                </div>

                <!-- VIP -->
                <div class="border-t border-[#FFF7EB]/8 pt-4">
                    <label class="flex items-center gap-3 cursor-pointer p-4 bg-black/40 rounded-xl border border-[#FFF7EB]/10 hover:border-[#DB7944]/40 transition group">
                        <input type="checkbox" id="profileVIP" class="w-5 h-5 accent-[#DB7944]"/>
                        <div>
                            <div class="font-bold text-[#DB7944] flex items-center gap-2 text-sm">
                                Já tenho meu ingresso! <span id="icon-crown-small"></span>
                            </div>
                            <div class="text-xs text-[#FFF7EB]/40 mt-0.5">Ativa a coroa e brilho especial no avatar.</div>
                        </div>
                    </label>
                </div>

                <button id="saveProfileBtn" class="vintage-btn w-full font-medium py-3.5 rounded-lg tracking-wide text-base">
                    Entrar na Festa
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ── ÍCONES ──
        const Icons = {
            users:    `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
            crown:    `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"/></svg>`,
            settings: `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
            play:     `<svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
            music:    `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`,
            musicBig: `<svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`,

        // ── FIREBASE LISTENERS ──
        function setupFirebaseListeners() {
            if (!currentUser || !db) return;
            const base = ['artifacts', appId, 'public', 'data'];
            const usersRef  = collection(db, ...base, 'users');
            const chatRef   = collection(db, ...base, 'chat');
            const queueRef  = collection(db, ...base, 'queue');
            const playerRef = collection(db, ...base, 'player');

            onSnapshot(usersRef, snap => {
                const now = Date.now();
                activeUsers = snap.docs.map(d => ({id:d.id,...d.data()}))
                    .filter(u => u.lastUpdate && (now - u.lastUpdate) < 120000);
                renderUsers();
                renderDJBooth();
            }, console.error);

            onSnapshot(chatRef, snap => {
                const msgs = snap.docs.map(d => ({id:d.id,...d.data()}));
                msgs.sort((a,b) => a.timestamp - b.timestamp);
                chatMessages = msgs.slice(-50);
                renderChat();
            }, console.error);

            onSnapshot(queueRef, snap => {
                const q = snap.docs.map(d => ({id:d.id,...d.data()}));
                q.sort((a,b) => a.timestamp - b.timestamp);
                queue = q;
                renderQueue();
            }, console.error);

            onSnapshot(playerRef, snap => {
                const state = snap.docs.map(d => ({id:d.id,...d.data()})).find(s => s.id === 'state');
                if (state) { currentVideo = state; renderPlayer(); renderDJBooth(); renderUsers(); }
            }, console.error);
        }

            if (x !== null && y !== null) { data.x = x; data.y = y; }
            else {
                const me = activeUsers.find(u => u.id === currentUser.uid);
                data.x = me?.x ?? 50;
                data.y = me?.y ?? 50;
            }
            try { await setDoc(ref, data, {merge:true}); } catch(e) { console.error(e); }
        }

            updatePresence();

        // ── RENDER USUÁRIOS ──
        function renderUsers() {
            document.getElementById('onlineCount').innerText = `${activeUsers.length} online`;
            const layer = document.getElementById('usersLayer');
            layer.innerHTML = '';

            activeUsers.forEach(u => {
                const isDJ   = !!(currentVideo?.videoId) && currentVideo?.addedByUid === u.id;
                const isMe   = u.id === currentUser?.uid;
                const posX   = isDJ ? DJ_X : (u.x ?? 50);
                const posY   = isDJ ? DJ_Y : (u.y ?? 50);
                const color  = u.color || '#DB7944';
                const vipGlow = `0 0 22px rgba(219,121,68,.7), 0 0 44px rgba(219,121,68,.3), 0 0 0 3px #DB7944`;
                const djGlow  = `0 0 20px rgba(255,0,200,.8), 0 0 40px rgba(255,0,200,.4), 0 0 0 3px #ff00cc`;
                const normGlow = `0 0 14px ${color}60, 0 0 0 2px ${color}`;
                const shadow  = isDJ ? djGlow : (u.isVIP ? vipGlow : normGlow);
                const bounce  = isDJ ? 'dj-bounce' : (u.isVIP ? 'animate-bounce' : '');
                const speed   = isDJ ? '.75s' : '2s';

                const el = document.createElement('div');
                el.className = 'absolute transform -translate-x-1/2 -translate-y-1/2 transition-all duration-700 ease-out flex flex-col items-center pointer-events-none';
                el.style.cssText = `left:${posX}%;top:${posY}%;z-index:${isMe?50:isDJ?40:10}`;
                el.innerHTML = `
<div class="relative">
  ${isDJ ? `<div class="absolute -top-4 -right-3 text-[#ff00cc]" style="width:15px;height:15px">${Icons.headphones}</div>` : ''}
  ${u.isVIP ? `<div class="absolute -top-5 left-1/2 -translate-x-1/2 text-[#DB7944]" style="width:20px;height:20px">${Icons.crown}</div>` : ''}
  <div class="w-14 h-14 rounded-full overflow-hidden bg-[#111] ${bounce}" style="box-shadow:${shadow};animation-duration:${speed}">
    <img src="${getAvatarUrl(u.avatarConfig)}" alt="${u.name}" class="w-full h-full object-cover"/>
  </div>
  <div class="mt-1.5 px-2 py-0.5 rounded text-[10px] whitespace-nowrap border backdrop-blur-sm flex items-center gap-1 font-light" style="background:rgba(0,0,0,.85);border-color:${isDJ?'rgba(255,0,204,.25)':color+'25'}">
    <span style="color:${isDJ?'#ff00cc':color}">●</span>
    ${u.name}${isMe?' (Você)':''}${isDJ?' 🎧':''}
  </div>
</div>`;
                layer.appendChild(el);
            });
        }

        // ── RENDER CHAT ──
        function renderChat() {
            const c = document.getElementById('chatMessages');
            c.innerHTML = '';
            if (!chatMessages.length) {
                c.innerHTML = `<div class="text-center text-[#FFF7EB]/30 text-sm mt-10 font-light">Seja o primeiro a mandar mensagem!</div>`;
                return;
            }
            chatMessages.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'fade-in-up';
                const time = new Date(msg.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
                const crown = msg.isVIP ? `<span class="text-[#DB7944]" style="width:11px;height:11px;display:inline-block">${Icons.crown}</span>` : '';
                div.innerHTML = `
<div class="flex items-baseline gap-1.5 mb-0.5">
  <span class="font-semibold text-xs flex items-center gap-1 tracking-wide" style="color:${msg.color}">${crown}${msg.name}</span>
  <span class="text-[9px] text-[#FFF7EB]/30">${time}</span>
</div>
<div class="text-xs text-[#FFF7EB]/85 break-words font-light${msg.isVIP?' border-l-2 pl-2':''}" style="${msg.isVIP?`border-color:${msg.color}`:''}">
  ${msg.text}
</div>`;
                c.appendChild(div);
            });
            c.scrollTop = c.scrollHeight;
        }

        // ── RENDER FILA ──
        function renderQueue() {
            document.getElementById('queueCount').innerText = `${queue.length} vídeos`;
            const c = document.getElementById('queueList');
            c.innerHTML = '';
            if (!queue.length) {
                c.innerHTML = `<div class="text-[11px] text-[#FFF7EB]/30 text-center mt-6 font-light">Fila vazia. Adicione o próximo hit!</div>`;
                return;
            }
            queue.forEach((item, i) => {
                const mine = currentUser && item.addedByUid === currentUser.uid;
                const div = document.createElement('div');
                div.className = `flex items-center gap-2.5 bg-black/25 p-2 rounded border transition ${mine?'border-[#DB7944]/35':'border-[#FFF7EB]/8 hover:border-[#DB7944]/35'}`;
                div.innerHTML = `
<span class="text-[#FFF7EB]/30 font-mono text-xs w-4">${i+1}.</span>
<img src="https://img.youtube.com/vi/${item.videoId}/default.jpg" class="w-11 h-8 object-cover rounded shadow"/>
<div class="flex-1 overflow-hidden">
  <p class="text-[10px] text-[#FFF7EB]/55 truncate">por: <span class="${mine?'text-[#DB7944]':'text-[#FFF7EB]'} font-medium">${item.addedByName}</span></p>
  ${mine?'<p class="text-[9px] text-[#DB7944]/55 mt-0.5">Sua música 🎵</p>':''}
</div>`;
                c.appendChild(div);
            });
        }

        // ── RENDER PLAYER ──
        function renderPlayer() {
            const c = document.getElementById('playerContainer');
            if (currentVideo?.videoId) {
                const isMe = currentUser && currentVideo.addedByUid === currentUser.uid;
                c.innerHTML = `
<iframe class="w-full h-full" src="https://www.youtube.com/embed/${currentVideo.videoId}?autoplay=1&controls=1&enablejsapi=1"
  frameBorder="0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowFullScreen></iframe>
${isMe?`<div class="absolute top-2 left-2 bg-[#ff00cc] text-white text-[10px] px-3 py-1 rounded-full font-bold shadow-lg my-turn-badge">🎧 É a sua vez na mesa!</div>`:''}
<div class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition">
  <button onclick="window.playNextVideo()" class="bg-black/80 backdrop-blur-md text-[#FFF7EB] border border-[#FFF7EB]/20 text-xs px-3 py-1.5 rounded-full hover:bg-[#DB7944] hover:border-[#DB7944] transition flex items-center gap-1 shadow-lg">
    ${Icons.play} Pular
  </button>
</div>`;
            } else {
                c.innerHTML = `
<div class="text-center flex flex-col items-center">
  <div class="mb-3 text-[#FFF7EB]/10">${Icons.musicBig}</div>
  <p class="text-[#FFF7EB]/45 font-medium tracking-wide text-sm">Nenhuma música tocando.</p>
  <p class="text-xs text-[#FFF7EB]/25 font-light mt-1">Adicione um vídeo na fila!</p>
</div>`;
            }
        }

        // ── CHAT ──
        document.getElementById('chatInput').addEventListener('input', e => {
            document.getElementById('chatSubmit').disabled = !e.target.value.trim();
        });
        document.getElementById('chatForm').addEventListener('submit', async e => {
            e.preventDefault();
            const inp = document.getElementById('chatInput');
            const text = inp.value.trim();
            if (!currentUser || !text) return;
            if (!db) { alert('Firebase não configurado. Chat indisponível.'); return; }
            const ref = collection(db, 'artifacts', appId, 'public', 'data', 'chat');
            await addDoc(ref, {uid:currentUser.uid, name:localProfile.name, isVIP:localProfile.isVIP, color:localProfile.color, text, timestamp:Date.now()});
            inp.value = '';
            document.getElementById('chatSubmit').disabled = true;
        });

        // ── FILA ──
        const extractYouTubeId = url => {
            const m = url.match(/^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
            return m && m[2].length === 11 ? m[2] : null;
        };

        document.getElementById('queueForm').addEventListener('submit', async e => {
            e.preventDefault();
            if (!currentUser) return;
            const inp = document.getElementById('videoUrlInput');
            const videoId = extractYouTubeId(inp.value);
            if (!videoId) { alert('Link do YouTube inválido.'); return; }
            if (!db) { alert('Firebase não configurado. Fila indisponível.'); return; }
            const ref = collection(db, 'artifacts', appId, 'public', 'data', 'queue');
            await addDoc(ref, {videoId, addedByName:localProfile.name, addedByUid:currentUser.uid, timestamp:Date.now()});
            inp.value = '';
            if (!currentVideo?.videoId) window.playNextVideo(videoId);
        });

        window.playNextVideo = async (overrideId = null) => {
            if (!currentUser || !db) return;
            let vid = overrideId, docId = null;
            let byName = localProfile.name, byUid = currentUser.uid;
            if (!vid && queue.length > 0) {
                vid = queue[0].videoId; docId = queue[0].id;
                byName = queue[0].addedByName || byName;
                byUid  = queue[0].addedByUid  || byUid;
            }
            const stateRef = doc(db, 'artifacts', appId, 'public', 'data', 'player', 'state');
            if (vid) {
                await setDoc(stateRef, {videoId:vid, startedAt:Date.now(), addedByName:byName, addedByUid:byUid});
                if (docId) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'queue', docId));
            } else {
                await setDoc(stateRef, {videoId:null, startedAt:null, addedByName:null, addedByUid:null});
            }
        };

        // ── MODAL DO AVATAR ──
        function renderSettingsModal() {
            document.getElementById('avatarPreviewImage').src = getAvatarUrl(localProfile.avatarConfig);
            const c = localProfile.color;
            document.getElementById('avatarPreviewContainer').style.cssText =
                `box-shadow: 0 0 0 3px ${c}, 0 0 24px ${c}60`;
            document.getElementById('profileName').value = localProfile.name;
            document.getElementById('profileVIP').checked = localProfile.isVIP;

            function btns(containerId, options, key) {
                document.getElementById(containerId).innerHTML = options.map(opt =>
                    `<button type="button" onclick="window.updateAvatar('${key}','${opt.v}')" class="av-btn ${localProfile.avatarConfig[key]===opt.v?'av-btn-on':'av-btn-off'}">${opt.l}</button>`
                ).join('');
            }
            btns('avatarTops',        TOPS,        'top');
            btns('avatarAccessories', ACCESSORIES, 'accessories');
            btns('avatarFacialHair',  FACIAL_HAIR, 'facialHair');
            btns('avatarClothes',     CLOTHES,     'clothing');
            btns('avatarEyes',        EYES,        'eyes');
            btns('avatarEyebrows',    EYEBROWS,    'eyebrows');
            btns('avatarMouths',      MOUTHS,      'mouth');

            const circles = (id, items, key, colorFn, selectedFn) => {
                document.getElementById(id).innerHTML = items.map(s =>
                    `<button type="button" onclick="window.updateAvatar('${key}','${s.v}')" title="${s.l}"
                        class="w-7 h-7 rounded-full border-2 transition ${selectedFn(s.v)?'border-[#DB7944] scale-110 shadow-md shadow-[#DB7944]/30':'border-[#FFF7EB]/10 opacity-60 hover:opacity-100'}"
                        style="background:${colorFn(s)}"></button>`
                ).join('');
            };
            circles('avatarSkin',          SKIN_COLORS,  'skinColor',   s=>`#${s.v}`, v=>localProfile.avatarConfig.skinColor===v);
            circles('avatarHairColor',     HAIR_COLORS,  'hairColor',   s=>`#${s.v}`, v=>localProfile.avatarConfig.hairColor===v);
            circles('avatarClothingColor', CLOTHES_COLORS,'clothesColor',s=>`#${s.v}`, v=>localProfile.avatarConfig.clothesColor===v);

            document.getElementById('avatarColors').innerHTML = AURA_COLORS.map(col =>
                `<button type="button" onclick="window.updateProfileColor('${col}')"
                    class="w-8 h-8 rounded-full transition border-2 ${localProfile.color===col?'scale-110 border-white shadow-lg':'border-transparent opacity-55 hover:opacity-100'}"
                    style="background:${col};${localProfile.color===col?`box-shadow:0 0 12px ${col}90`:''}"></button>`
            ).join('');
        }

        window.updateAvatar = (key, val) => { localProfile.avatarConfig[key] = val; renderSettingsModal(); };
        window.updateProfileColor = col => { localProfile.color = col; renderSettingsModal(); };

        document.getElementById('profileName').addEventListener('input', e => {
            localProfile.name = e.target.value || 'Investidor';
        });
        document.getElementById('profileVIP').addEventListener('change', e => {
            localProfile.isVIP = e.target.checked;
        });
        document.getElementById('saveProfileBtn').addEventListener('click', () => {
            updatePresence();
            const ha = document.getElementById('headerAvatar');
            ha.src = getAvatarUrl(localProfile.avatarConfig);
            ha.classList.remove('hidden');
            const hn = document.getElementById('headerName');
            hn.innerText = localProfile.name;
            hn.classList.remove('hidden');
            const hc = document.getElementById('headerCrown');
            if (localProfile.isVIP) { hc.innerHTML = Icons.crown; hc.classList.remove('hidden'); }
            else hc.classList.add('hidden');
            document.getElementById('settingsModal').classList.add('hidden');
        });
        document.getElementById('openSettingsBtn').addEventListener('click', () => {
            renderSettingsModal();
            document.getElementById('settingsModal').classList.remove('hidden');
        });

        renderSettingsModal();
    </script>
</body>
</html>
